version: '3.8'

networks:
  dms-local-network:
    driver: bridge

volumes:
  dms_db_data:
  kafka-data-single:

services:
  dms_db:
    image: postgres:16.3-alpine
    container_name: dms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dms_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"
    volumes:
      - "./init-scripts:/docker-entrypoint-initdb.d"
      - "dms_db_data:/var/lib/postgresql/data"
    networks:
      - dms-local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d dms_db -U admin"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: -c 'wal_level=logical'

  eureka-service:
    container_name: eureka-server
    build:
      context: C:/Users/IVAN/IdeaProjects/Aston/MyCare/infra/eureka-server/
    ports:
      - "8761:8761"
    env_file:
      - .env
    networks:
      - dms-local-network
    depends_on:
      dms_db:
        condition: service_healthy

  kafka-0:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka-single
    ports:
      - "19092:19092"
    networks:
      - dms-local-network
    volumes:
      - kafka-data-single:/bitnami/kafka
    environment:
      - KAFKA_KRAFT_CLUSTER_ID=949b3cb9-d766-4961-9177-d8e27575e96a
      - KAFKA_CFG_BROKER_ID=1
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-0:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-0:9092,EXTERNAL://localhost:19092
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_CFG_NUM_PARTITIONS=3
      - KAFKA_CFG_MIN_INSYNC_REPLICAS=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: kafka-connect
    ports:
      - "8083:8083"
    networks:
      - dms-local-network
    environment:
      BOOTSTRAP_SERVERS: 'kafka-0:9092'
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      HEADER_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_HEADER_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/kafka/connect"
    depends_on:
      kafka-0:
        condition: service_healthy
      dms_db:
        condition: service_healthy

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8081:8080"
    networks:
      - dms-local-network
    environment:
      KAFKA_CLUSTERS_0_NAME: "local-kafka-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-0:9092"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: "local-connect"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://connect:8083"
    depends_on:
      kafka-0:
        condition: service_healthy
      connect:
        condition: service_started
