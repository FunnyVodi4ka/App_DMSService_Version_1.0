databaseChangeLog:
  - changeSet:
      id: transfer_to_dms_service_schema
      author: Ivan Sergienko

      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: '1'
            sql: |
              SELECT COUNT(*)
              FROM pg_type t
              JOIN pg_namespace n ON n.oid = t.typnamespace
              WHERE t.typname = 'dmstype' AND n.nspname = 'public';

      changes:
        - sqlFile:
            path: classpath:db/changelog/v1.0/sql/transfer-to-dms-service-schema.sql