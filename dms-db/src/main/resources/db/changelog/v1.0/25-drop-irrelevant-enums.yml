databaseChangeLog:
  - changeSet:
      id: drop-identitydocumenttype-enum
      author: Ivan_Sakharov
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: '1'
            sql:
              SELECT COUNT(*) FROM pg_type WHERE typname = 'identitydocumenttype'
      changes:
        - sql:
            sql:
              DROP TYPE IF EXISTS identitydocumenttype;
      rollback:
        - sql:
            sql:
              CREATE TYPE identitydocumenttype AS ENUM
              ('PASSPORT', 'BIRTH_CERTIFICATE', 'POWER_OF_ATTORNEY');
        - sql:
            sql:
              ALTER TYPE dms_service.identitydocumenttype OWNER TO admin;

