databaseChangeLog:
  - changeSet:
      id: create_client_company_client_type_enum
      author: Ivan Sakharov
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: '0'
            sql: SELECT COUNT(*) FROM pg_type WHERE typname = 'client_company_client_type'
      changes:
        - sql:
            sql: CREATE TYPE client_company_client_type AS ENUM ('ACTIVE', 'INACTIVE');
      rollback:
        - sql:
            sql: DROP TYPE IF EXISTS client_company_client_type


