  - changeSet:
      id: add_familial_basic_value_to_dmstype
      author: Ivan Sakharov
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: '1'
            sql: SELECT 1 FROM pg_type WHERE typname = 'dmstype'
        - sqlCheck:
            expectedResult: '0'
            sql: SELECT COUNT(*) FROM pg_enum e JOIN pg_type t ON t.oid = e.enumtypid
                  WHERE t.typname = 'dmstype' AND e.enumlabel = 'FAMILIAL-BASIC'
      changes:
        - sql:
            sql: ALTER TYPE dmstype ADD VALUE 'FAMILIAL-BASIC'

