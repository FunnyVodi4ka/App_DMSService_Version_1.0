databaseChangeLog:
  - changeSet:
      id: create_shedlock_table
      author: Nikolai Fufaev
      changes:
        - sql:
            sql: DROP TABLE IF EXISTS shedlock
        - createTable:
            tableName: shedlock
            columns:
              - column:
                  name: name
                  type: varchar(64)
                  constraints:
                    primaryKey: true
              - column:
                  name: lock_until
                  type: timestamp
              - column:
                  name: locked_at
                  type: timestamp
              - column:
                  name: locked_by
                  type: varchar(255)