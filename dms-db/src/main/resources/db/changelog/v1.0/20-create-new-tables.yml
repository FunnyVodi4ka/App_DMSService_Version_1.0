databaseChangeLog:
  - changeSet:
      id: create_identity_documents_table
      author: Ivan Sakharov
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: dms_service
                tableName: identity_documents
      changes:
        - createTable:
            schemaName: dms_service
            tableName: identity_documents
            columns:
              - column:
                  name: identity_document_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: identity_document_type
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: identity_document_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: identity_document_issue
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: issue_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: mongo_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: loaded_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false

              - column:
                  name: expired_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            schemaName: dms_service
            tableName: identity_documents
            cascadeConstraints: true

