databaseChangeLog:
  - changeSet:
      id: fk-insured-persons-doc
      author: Ivan Sakharov
      changes:
        - addForeignKeyConstraint:
            baseTableSchemaName: dms_service
            baseTableName: insured_persons
            baseColumnNames: identity_document_id
            referencedTableSchemaName: dms_service
            referencedTableName: identity_documents
            referencedColumnNames: identity_document_id
            constraintName: fk_insured_persons_identity_documents

