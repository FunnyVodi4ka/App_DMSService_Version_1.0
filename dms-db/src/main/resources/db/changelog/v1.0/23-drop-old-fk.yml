databaseChangeLog:
  - changeSet:
      id: drop-fk-dms_insurance-dependent_person
      author: Ivan Sakharov
      preConditions:
        - onFail: MARK_RAN
          foreignKeyConstraintExists:
            foreignKeyName: fk_dependent_person_id
      changes:
        - dropForeignKeyConstraint:
            baseTableSchemaName: dms_service
            baseTableName: dms_insurance
            constraintName: fk_dependent_person_id

