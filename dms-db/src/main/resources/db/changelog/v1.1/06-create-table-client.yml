databaseChangeLog:
  - changeSet:
      id: 06-create-table-client
      author: Ivan Sakharov
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: dms_service
                tableName: client
      changes:
        - createTable:
            tableName: client
            columns:
              - column:
                  name: client_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_type
                  type: client_type_enum
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: middle_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

      rollback:
        - dropTable:
            tableName: client